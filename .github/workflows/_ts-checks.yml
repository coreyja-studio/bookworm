name: TypeScript Checks

on:
  workflow_call:

jobs:
  ts-checks:
    name: Lint + Format + Typecheck + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Verify built JS is up to date
        run: |
          npm run build
          git diff --exit-code ts/dist/ || {
            echo "ts/dist/ is out of date. Run 'npm run build' and commit the result."
            exit 1
          }
