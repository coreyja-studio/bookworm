name: Rust Checks

on:
  workflow_call:

env:
  CARGO_TERM_COLOR: always
  CARGO_BUILD_JOBS: 1

jobs:
  rust-checks:
    name: Clippy + SQLx + Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bookworm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/bookworm_test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy

      - name: Install cargo-binstall
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Install sqlx-cli
        run: cargo binstall --no-confirm --force sqlx-cli@0.8.6

      - name: Run migrations
        run: sqlx migrate run

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Check sqlx prepare is up to date
        run: |
          cargo sqlx prepare --workspace --check 2>&1 || {
            echo "=== Check failed, running prepare to see diff ==="
            cargo sqlx prepare --workspace
            git diff --stat .sqlx/
            exit 1
          }

      - name: Run tests
        run: cargo test --all-targets
